schema: paperclip/v1
agents:
  coordinator:
    role: coordinator
    icon: git-branch
    capabilities: Top-level orchestrator. Routes incoming tasks to the right GTeam
      specialist. Creates subtasks, monitors progress, approves or rejects results.
    adapter:
      type: claude_local
      config:
        dangerouslyBypassApprovalsAndSandbox: true
    runtime:
      heartbeat:
        enabled: true
        wakeOnDemand: true
        intervalSec: 3600
        cooldownSec: 10
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: false
  accessibilityauditor:
    role: accessibility-auditor
    icon: user
    capabilities: WCAG 2.2 accessibility auditing, assistive technology testing, ARIA
      patterns, and remediation guidance for web and mobile applications.
    adapter:
      type: claude_local
      config:
        dangerouslyBypassApprovalsAndSandbox: true
    runtime:
      heartbeat:
        enabled: true
        wakeOnDemand: true
        intervalSec: 3600
        cooldownSec: 10
        maxConcurrentRuns: 2
  accountant:
    role: accountant
    icon: user
    capabilities: Financial analysis, bookkeeping review, expense categorisation,
      and tax considerations. Works with P&L, balance sheets, and bank statements.
    adapter:
      type: claude_local
      config:
        dangerouslyBypassApprovalsAndSandbox: true
    runtime:
      heartbeat:
        enabled: true
        wakeOnDemand: true
        intervalSec: 3600
        cooldownSec: 10
        maxConcurrentRuns: 2
  aiengineer:
    role: ai-engineer
    icon: user
    capabilities: "AI/ML system design \u2014 model integration, RAG pipelines, prompt\
      \ engineering, MLOps, and evaluation. Bridges ML research and production engineering."
    adapter:
      type: codex_local
      config:
        model: codex-1
        dangerouslyBypassApprovalsAndSandbox: true
    runtime:
      heartbeat:
        enabled: true
        wakeOnDemand: true
        intervalSec: 3600
        cooldownSec: 10
        maxConcurrentRuns: 2
  brandstrategist:
    role: brand-strategist
    icon: user
    capabilities: Brand identity, positioning, messaging strategy, voice and tone
      guidelines, and brand consistency reviews. Works with logos, copy, campaigns,
      and competitive positioning.
    adapter:
      type: claude_local
      config:
        dangerouslyBypassApprovalsAndSandbox: true
    runtime:
      heartbeat:
        enabled: true
        wakeOnDemand: true
        intervalSec: 3600
        cooldownSec: 10
        maxConcurrentRuns: 2
  communitymanager:
    role: community-manager
    icon: user
    capabilities: "Community platform management for Discord, Slack, Reddit, and forums\
      \ \u2014 server setup, moderation, engagement automation, health metrics, and\
      \ escalation."
    adapter:
      type: codex_local
      config:
        model: codex-1
        dangerouslyBypassApprovalsAndSandbox: true
    runtime:
      heartbeat:
        enabled: true
        wakeOnDemand: true
        intervalSec: 3600
        cooldownSec: 10
        maxConcurrentRuns: 2
  contentcreator:
    role: content-creator
    icon: user
    capabilities: Blog posts, landing copy, guides, and long-form content. Produces
      publish-ready content with SEO metadata.
    adapter:
      type: codex_local
      config:
        model: codex-1
        dangerouslyBypassApprovalsAndSandbox: true
    runtime:
      heartbeat:
        enabled: true
        wakeOnDemand: true
        intervalSec: 3600
        cooldownSec: 10
        maxConcurrentRuns: 2
  copywriter:
    role: copywriter
    icon: user
    capabilities: Direct-response copywriter for sales pages, email sequences, ad
      copy, VSL scripts, and brand voice guidelines.
    adapter:
      type: codex_local
